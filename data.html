<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dataset - Analisis Sentimen</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }
      body {
        display: flex;
        background: #f4f7f6;
        min-height: 100vh;
        color: #2c3e50;
      }
      .sidebar {
        width: 250px;
        background: #1b263b;
        color: white;
        padding: 25px;
        height: 100vh;
        position: fixed;
      }
      .logo {
        text-align: center;
        margin-bottom: 35px;
      }
      .logo img {
        width: 65px;
        background: white;
        border-radius: 50%;
        padding: 5px;
        margin-bottom: 10px;
      }
      .menu a {
        display: block;
        color: #bdc3c7;
        padding: 12px 15px;
        text-decoration: none;
        border-radius: 8px;
        margin-bottom: 8px;
        transition: 0.3s;
      }
      .menu a:hover {
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }
      .menu a.active {
        background: #3498db;
        color: white;
        box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
      }
      .content {
        margin-left: 250px;
        padding: 30px;
        width: calc(100% - 250px);
        display: grid;
        grid-template-columns: 1.6fr 1.4fr;
        gap: 25px;
        align-items: start;
      }
      .header-section {
        grid-column: span 2;
        margin-bottom: 10px;
      }
      .card {
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        margin-bottom: 25px;
      }
      h3 {
        font-size: 1.1rem;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
        color: #34495e;
      }
      .import-group {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }
      input[type="file"] {
        flex: 1;
        padding: 10px;
        border: 1px dashed #cbd5e0;
        border-radius: 8px;
        font-size: 0.85rem;
      }
      .btn-import {
        background: #2ecc71;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      .tab-container {
        display: flex;
        gap: 8px;
        margin-bottom: 15px;
        background: #f8f9fa;
        padding: 5px;
        border-radius: 10px;
      }
      .tab-btn {
        flex: 1;
        padding: 8px;
        border: none;
        background: none;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 600;
        color: #7f8c8d;
        border-radius: 8px;
      }
      .tab-btn.active {
        background: white;
        color: #3498db;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .badge-count {
        background: #ebf5fb;
        color: #3498db;
        padding: 2px 6px;
        border-radius: 6px;
        font-size: 0.7rem;
        margin-left: 5px;
      }
      .table-wrapper {
        max-height: 450px;
        overflow-y: auto;
        border: 1px solid #f1f5f9;
        border-radius: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        background: #f8fafc;
        padding: 12px;
        text-align: left;
        position: sticky;
        top: 0;
        font-size: 0.75rem;
        color: #64748b;
        border-bottom: 2px solid #edf2f7;
        z-index: 5;
      }
      td {
        padding: 10px;
        font-size: 0.75rem;
        border-bottom: 1px solid #f1f5f9;
      }
      .label-box {
        padding: 4px 8px;
        border-radius: 5px;
        font-weight: 600;
        font-size: 0.65rem;
        color: white;
        text-transform: uppercase;
      }
      .btn-delete {
        background: #fff5f5;
        color: #e53e3e;
        border: 1px solid #feb2b2;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 0.75rem;
        cursor: pointer;
        float: right;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="logo">
        <img
          src="logo.png"
          alt="Logo"
          onerror="this.src = 'https://via.placeholder.com/60?text=BPJS'"
        />
        <h3>BPJS Kesehatan</h3>
      </div>
      <div class="menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="data.html" class="active">Data</a>
        <a href="prediction.html">Prediction</a>
        <a href="evaluation.html">Evaluation</a>
      </div>
    </div>

    <div class="content">
      <div class="header-section">
        <h2>Eksplorasi & Manajemen Data</h2>
        <p style="color: #7f8c8d; font-size: 0.9rem">
          Kelola dataset latih, uji, dan database ulasan terkini.
        </p>
      </div>

      <div class="left-col">
        <div class="card">
          <h3>Import Database Baru</h3>
          <form
            id="importForm"
            enctype="multipart/form-data"
            class="import-group"
          >
            <input
              type="file"
              name="file_csv"
              id="file_csv"
              accept=".csv"
              required
            />
            <button type="submit" class="btn-import">Import</button>
          </form>
          <div
            id="statusMessage"
            style="margin-top: 10px; font-size: 0.8rem"
          ></div>
        </div>

        <div class="card">
          <button
            class="btn-delete"
            onclick="alert('Fitur hapus segera hadir!')"
          >
            Hapus Semua
          </button>
          <h3>Data Database Terkini</h3>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th style="width: 60px">Rating</th>
                  <th>Ulasan</th>
                  <th>Tanggal</th>
                  <th>Sentiment</th>
                  <th>Rating Label</th>
                </tr>
              </thead>
              <tbody id="dataContent">
                <tr>
                  <td colspan="5" style="text-align: center; padding: 20px">
                    Memuat database MySQL...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="right-col">
        <div class="card">
          <h3>Dataset</h3>
          <div class="tab-container">
            <button
              class="tab-btn active"
              onclick="switchTab('data latih', this)"
            >
              Data Latih <span class="badge-count" id="countTrain">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('uji', this)">
              Data Uji <span class="badge-count" id="countTest">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('lexicon', this)">
              Lexicon vs Rating <span class="badge-count" id="countAll">0</span>
            </button>
          </div>

          <div class="table-wrapper" style="max-height: 560px">
            <table id="datasetTable">
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("importForm").onsubmit = function (e) {
        e.preventDefault();
        let formData = new FormData(this);
        document.getElementById("statusMessage").innerHTML =
          "<i>Sedang memproses...</i>";
        fetch("import.php", { method: "POST", body: formData })
          .then((res) => res.text())
          .then((data) => {
            document.getElementById("statusMessage").innerHTML =
              `<span style="color:#27ae60">${data}</span>`;
            loadMySQLData();
          });
      };

      function loadMySQLData() {
        fetch("get_data.php")
          .then((res) => res.json())
          .then((data) => {
            let html = data
              .map(
                (row) => `
                <tr>
                    <td><b>${row.rating}</b> ⭐</td>
                    <td title="${row.review_text}">${row.review_text.substring(0, 30)}...</td>
                    <td><small>${row.date}</small></td>
                    <td><span class="label-box" style="background:${getColor(row.sentimen_label)}">${row.sentimen_label}</span></td>
                    <td><small>${row.rating_label}</small></td>
                </tr>`,
              )
              .join("");
            document.getElementById("dataContent").innerHTML =
              html ||
              "<tr><td colspan='5' style='text-align:center;'>Database kosong</td></tr>";
          })
          .catch(() => {
            document.getElementById("dataContent").innerHTML =
              "<tr><td colspan='5' style='text-align:center; color:red;'>Gagal koneksi MySQL (XAMPP)</td></tr>";
          });
      }

      var dataLatih = [],
        dataUji = [],
        dataAll = [];

      function loadCSVs() {
        const files = [
          { name: "train_data.csv", key: "latih", countId: "countTrain" },
          { name: "test_data.csv", key: "uji", countId: "countTest" },
          {
            name: "hasil_sentimen_ulasan_app_bpjs.csv",
            key: "lexicon",
            countId: "countAll",
          },
        ];

        files.forEach((f) => {
          Papa.parse(f.name, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function (results) {
              console.log("Loaded " + f.name + ": ", results.data.length);

              if (f.key === "latih") dataLatih = results.data;
              if (f.key === "uji") dataUji = results.data;
              if (f.key === "lexicon") dataAll = results.data;

              document.getElementById(f.countId).innerText =
                results.data.length;

              if (f.key === "latih") renderCSVTable("latih", dataLatih);
            },
          });
        });
      }

      function getColor(label) {
        if (!label) return "#95a5a6";
        label = label.toString().toLowerCase();
        if (label.includes("pos")) return "#2ecc71";
        if (label.includes("neg")) return "#e74c3c";
        return "#f1c40f";
      }

      function renderCSVTable(type, data) {
        const thead = document.getElementById("tableHead");
        const tbody = document.getElementById("tableBody");
        thead.innerHTML = "";
        tbody.innerHTML = "";

        if (!data || data.length === 0) {
          tbody.innerHTML =
            "<tr><td colspan='4' style='text-align:center;'>Data tidak ditemukan (Cek file CSV)</td></tr>";
          return;
        }

        let htmlHead = "";
        let htmlBody = "";

        if (type === "lexicon") {
          htmlHead = `<tr><th>Review</th><th style="width:50px">RTG</th><th>Rating Based</th><th>Lexicon Based</th></tr>`;
          htmlBody = data
            .slice(0, 50)
            .map((row) => {
              let review = row["Review Text"] || row["review_text"] || row["text"] || "-";
              
              let rtgValue = parseInt(row["Rating"] || row["rating"] || row["score"] || 0);

              let rtgLabel = row["rating_label"] || row["Rating Based"] || row["Rating Label"] || "";
              
               if (!rtgLabel && rtgValue > 0) {
                rtgLabel = rtgValue >= 4 ? "POSITIVE" : (rtgValue === 3 ? "NEUTRAL" : "NEGATIVE");
              } else if (!rtgLabel) {
                rtgLabel = "-";
              }

              let lexLabel = row["sentimen_label"] || row["sentiment_label"] || row["sentimen"] || row["Lexicon Based"] || "-";

              return `<tr>
                <td title="${review}">${review.substring(0, 35)}...</td>
                <td>${rtgValue}⭐</td>
                <td><span class="label-box" style="background:${getColor(rtgLabel)}">${rtgLabel.toUpperCase()}</span></td>
                <td><span class="label-box" style="background:${getColor(lexLabel)}">${lexLabel.toUpperCase()}</span></td>
              </tr>`;
            })
            .join("");
            
        } else {
          htmlHead = `<tr><th>Review</th><th>Sentimen</th></tr>`;
          htmlBody = data
            .slice(0, 50)
            .map((row) => {
              let review =
                row["Review Text"] ||
                row["text"] ||
                row["review"] ||
                row["Review"] ||
                "-";

              let lbl =
                row["sentimen"] ||
                row["Sentimen"] ||
                row["label"] ||
                row["Label"] ||
                row["sentiment"] ||
                "-";

              return `<tr>
        <td>${review.substring(0, 60)}...</td>
        <td><b style="color:${getColor(lbl)}">${lbl.toUpperCase()}</b></td>
        </tr>`;
            })
            .join("");
        }
        thead.innerHTML = htmlHead;
        tbody.innerHTML = htmlBody;
      }

      function switchTab(type, btn) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        if (type === "latih") renderCSVTable("latih", dataLatih);
        else if (type === "uji") renderCSVTable("uji", dataUji);
        else renderCSVTable("lexicon", dataAll);
      }

      window.onload = function () {
        loadMySQLData();
        loadCSVs();
      };
    </script>
  </body>
</html>
